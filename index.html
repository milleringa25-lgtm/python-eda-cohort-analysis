<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cohort analysis report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 30px;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .chart-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
        }
        /* Центрування 5-го графіка у нижньому рядку */
        .chart-card:last-child:nth-child(odd) {
            grid-column: span 2;
            justify-self: center;
            width: calc(50% - 15px);
        }
        .chart-card h2 {
            font-size: 1.15rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: #34495e;
            line-height: 1.4;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        /* Адаптивність для смартфонів та планшетів */
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            .chart-card:last-child:nth-child(odd) {
                grid-column: span 1;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h1>Cohort analysis report</h1>
    
    <div class="grid-container">
        <!-- Графік 1 -->
        <div class="chart-card">
            <h2>1. Нові клієнти по місяцях (Cohort Size)</h2>
            <img src="1. Нові клієнти по місяцях (Cohort Size).png" alt="1. Нові клієнти по місяцях (Cohort Size)">
        </div>

        <!-- Графік 2 -->
        <div class="chart-card">
            <h2>2. Динаміка продажів Revenue and Orders</h2>
            <img src="2. Динаміка продажів Revenue and Orders.png" alt="2. Динаміка продажів Revenue and Orders">
        </div>

        <!-- Графік 3 -->
        <div class="chart-card">
            <h2>3. Повернення клієнтів по когортам (кількість)</h2>
            <img src="3. Повернення клієнтів по когортам (кількість).png" alt="3. Повернення клієнтів по когортам (кількість)">
        </div>

        <!-- Графік 4 -->
        <div class="chart-card">
            <h2>4. Відсоток повернення клієнтів (Retention Rate, %)</h2>
            <img src="4. Відсоток повернення клієнтів (Retention Rate, %).png" alt="4. Відсоток повернення клієнтів (Retention Rate, %)">
        </div>

        <!-- Графік 5 -->
        <div class="chart-card">
            <h2>5. Кількість користувачів за каналом залучення</h2>
            <img src="5. Кількість користувачів за каналом залучення.png" alt="5. Кількість користувачів за каналом залучення">
        </div>
    </div>

</body>
</html>
